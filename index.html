<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator</title>

  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calculator" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/Logo - M .png" />
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      display: grid;
      place-items: center;
      background: #f3f4f6;
    }

    .calculator {
      width: min(92vw, 360px);
      padding: 18px;
      border-radius: 22px;
      background: #111827;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .25);
    }

    .display {
      width: 100%;
      min-height: 92px;
      margin-bottom: 14px;
      padding: 18px;
      border: 0;
      border-radius: 14px;
      background: #030712;
      color: #fff;
      font-size: 2rem;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      min-height: 62px;
      border: 0;
      border-radius: 14px;
      font-size: 1.2rem;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      background: #374151;
      color: #fff;
    }

    button:hover { filter: brightness(1.15); }
    button:active { transform: scale(.98); }

    .operator { background: #d97706; }
    .utility { background: #6b7280; }
    .equals { background: #059669; }
    .wide { grid-column: span 2; }

    @media (prefers-color-scheme: dark) {
      body { background: #030712; }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <div id="display" class="display" role="status" aria-live="polite">0</div>

    <section class="keys">
      <button class="utility" data-action="clear">AC</button>
      <button class="utility" data-action="delete">⌫</button>
      <button class="utility" data-value="%">%</button>
      <button class="operator" data-value="/">÷</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operator" data-value="*">×</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operator" data-value="-">−</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="operator" data-value="+">+</button>

      <button class="wide" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="equals" data-action="equals">=</button>
    </section>
  </main>

  <script>
    const display = document.getElementById("display");
    let expression = "";

    function render(value = expression || "0") {
      display.textContent = value
        .replaceAll("*", "×")
        .replaceAll("/", "÷")
        .replaceAll("-", "−");
    }

    function append(value) {
      const operators = ["+", "-", "*", "/", "%"];
      const last = expression.slice(-1);

      if (operators.includes(value) && operators.includes(last)) {
        expression = expression.slice(0, -1) + value;
      } else {
        expression += value;
      }
      render();
    }

    function calculate() {
      if (!expression) return;

      try {
        const sanitized = expression.replace(/%/g, "/100");

        if (!/^[0-9+\-*/.()\s]+$/.test(sanitized)) {
          throw new Error("Invalid input");
        }

        const result = Function('"use strict"; return (' + sanitized + ')')();

        if (!Number.isFinite(result)) {
          throw new Error("Invalid result");
        }

        expression = String(Number(result.toFixed(10)));
        render();
      } catch {
        render("Error");
        expression = "";
      }
    }

    document.querySelector(".keys").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const { value, action } = button.dataset;

      if (value !== undefined) append(value);
      if (action === "clear") {
        expression = "";
        render();
      }
      if (action === "delete") {
        expression = expression.slice(0, -1);
        render();
      }
      if (action === "equals") calculate();
    });

    window.addEventListener("keydown", (event) => {
      if ("0123456789.+-*/%()".includes(event.key)) append(event.key);
      if (event.key === "Enter" || event.key === "=") calculate();
      if (event.key === "Backspace") {
        expression = expression.slice(0, -1);
        render();
      }
      if (event.key === "Escape") {
        expression = "";
        render();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch((error) => {
          console.error("Service worker registration failed:", error);
        });
      });
    }
  </script>
</body>
</html>
